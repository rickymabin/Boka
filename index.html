<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<h2>LINE打卡</h2>

<button onclick="clockIn()">上班</button>
<button onclick="clockOut()">下班</button>
<button onclick="status()">狀態</button>

<p id="msg"></p>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzmAi1YuZyuhVHmV67HdUpDuyn-wjqzG1jfLN09OPtf5A_TkPb3KrwgnMDnww0V5D_HIg/exec";

let token = "";

async function init(){
  await liff.init({ liffId:"2009512164-DC24Cr80" });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  token = liff.getAccessToken();
}

function getLocation(){
  return new Promise((res,rej)=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      res(pos.coords);
    },()=>rej());
  });
}

async function callAPI(action, coords){
  const r = await fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({
      action,
      accessToken:token,
      lat:coords.latitude,
      lng:coords.longitude,
      accuracy:coords.accuracy
    })
  });
  return r.json();
}

async function clockIn(){
  const c = await getLocation();
  const r = await callAPI("clock_in",c);
  msg.innerText = r.message;
}

async function clockOut(){
  const c = await getLocation();
  const r = await callAPI("clock_out",c);
  msg.innerText = r.message;
}

async function status(){
  const r = await callAPI("status",{});
  msg.innerText = r.message;
}

init();

</script>
</body>
</html>
